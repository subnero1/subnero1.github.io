<dialog id="configModal" class="modal-dialog job-details">
  <div class="modal-content">
    <header>
      <h2 id="jobModalTitle"></h2>
      <div class="job-points">
        <span class="time" id="jobModalType"></span>
        <span class="place" id="jobModalLocation"></span>
      </div>
      <button class="modal-close" type="button" id="closeModal" title="close">&times;</button>
    </header>
    <div class="main">
      {% assign job_listings = site.jobs | where: "active", true | sort: "order" %}
      {% for job in job_listings %}
        <div class="modal-content-item" data-product="{{ job.id }}" style="display: none;">
          <!-- <p>{{ job.summary }}</p> -->
          {{ job.content | markdownify }}
        </div>
      {% endfor %}
    </div>
    <div class="footer">
      <button class="button footer-close-btn" id="copyJobLink" type="button">Copy Link</button>
      <button class="button footer-close-btn" id="footerCloseModal">Close</button>
      {% assign firstJob = site.jobs | first %}
      <a class="button apply" id="jobApplyLink" href="" target="_blank" rel="noopener noreferrer">
        <span>Apply Now</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="external-link" class="lucide lucide-external-link w-4 h-4 ml-2"><path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path></svg>
      </a>
    </div>
  </div>
</dialog>

<script>
(function() {
  const modal = document.getElementById('configModal');
  const closeBtn = document.getElementById('closeModal');
  const footerCloseBtn = document.getElementById('footerCloseModal');
  const copyLinkBtn = document.getElementById('copyJobLink');
  const title = document.getElementById('jobModalTitle');
  const type = document.getElementById('jobModalType');
  const locationEl = document.getElementById('jobModalLocation');
  const applyLink = document.getElementById('jobApplyLink');
  let currentJobId = null;

  const jobs = Object.assign(Object.create(null), {
    {% assign job_listings = site.jobs | where: "active", true | sort: "order" %}
    {% for job in job_listings %}
      "{{ job.id }}": {
        "title": {{ job.title | jsonify }},
        "type": {{ job.employment_type | jsonify }},
        "location": {{ job.location | jsonify }},
        "apply_url": {{ job.apply_url | jsonify }}
      }{% if forloop.last == false %},{% endif %}
    {% endfor %}
  });

  function openJob(jobId, pushHash) {
    const job = jobs[jobId];
    if (!job) return;

    modal.querySelectorAll('.modal-content-item').forEach(item => {
      item.style.display = 'none';
    });

    const content = Array.from(modal.querySelectorAll('.modal-content-item'))
      .find(item => item.dataset.product === jobId);
    if (content) {
      content.style.display = 'block';
      content.scrollTop = 0;
    }

    title.textContent = job.title;
    type.textContent = job.type;
    locationEl.textContent = job.location;
    applyLink.href = job.apply_url;
    applyLink.style.display = job.apply_url ? 'inline-block' : 'none';

    currentJobId = jobId;
    if (pushHash !== false) {
      window.history.replaceState(null, '', '#' + jobId);
    }

    if (!modal.open) modal.showModal();
    requestAnimationFrame(() => {
      modal.scrollTop = 0;
      const main = modal.querySelector('.main');
      if (main) main.scrollTop = 0;
      if (content) content.scrollTop = 0;
    });
  }

  function clearHash() {
    if (window.location.hash) {
      window.history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  }

  document.querySelectorAll('.card-dialog:not(.multi)').forEach(card => {
    card.addEventListener('click', () => {
      const jobId = card.dataset.product;
      if (jobId) openJob(jobId);
    });
  });

  closeBtn.addEventListener('click', () => modal.close());
  footerCloseBtn.addEventListener('click', () => modal.close());

  copyLinkBtn.addEventListener('click', () => {
    if (!currentJobId) return;
    const url = window.location.origin + window.location.pathname + '#' + currentJobId;
    navigator.clipboard.writeText(url).then(() => {
      const original = copyLinkBtn.textContent;
      copyLinkBtn.textContent = 'Link Copied!';
      setTimeout(() => { copyLinkBtn.textContent = original; }, 1500);
    }).catch(() => {});
  });

  modal.addEventListener('close', () => {
    modal.querySelectorAll('.modal-content-item').forEach(item => {
      item.style.display = 'none';
    });
    modal.scrollTop = 0;
    const main = modal.querySelector('.main');
    if (main) main.scrollTop = 0;
    currentJobId = null;
    clearHash();
  });

  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.close();
  });

  window.addEventListener('hashchange', () => {
    const jobId = window.location.hash.replace('#', '');
    if (jobId && jobs[jobId]) openJob(jobId, false);
  });

  const initialJobId = window.location.hash.replace('#', '');
  if (initialJobId && jobs[initialJobId]) openJob(initialJobId, false);
})();
</script>
